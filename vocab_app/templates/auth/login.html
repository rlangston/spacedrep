{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h1 class="h3 mb-3">Login</h1>
    <form method="post" class="stat-card">
      <label class="form-label">Username</label>
      <input class="form-control mb-3" name="username" autocomplete="username" required>
      <label class="form-label">Password</label>
      <input class="form-control mb-3" name="password" type="password" autocomplete="current-password" required>
      <button class="btn btn-primary w-100" type="submit">Login</button>
    </form>
    <p class="mt-3">No account yet? <a href="{{ url_for('main.register') }}">Register</a></p>
  </div>
</div>
{% endblock %}
